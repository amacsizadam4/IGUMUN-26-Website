<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Under Construction</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<!-- CSS -->
<link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- HEADER -->
<div id="header"></div>

<!-- MAIN CONTENT -->
<main class="flex-fill">

<!-- Page Under Construction Section-->

<section class="under-construction-section">
    <div class="uc-background"></div>

    <div class="uc-content">
        <h2 class="uc-title">PAGE UNDER CONSTRUCTION</h2>
        <h2 class="uc-title">PLEASE CHECK AGAIN LATER</h2>
        <div class="uc-loader"></div>
        
    </div>
</section>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- Back To Top -->
<button id="backToTop" class="back-to-top">↑</button>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->
<script src="js/main.js"></script>

</body>
</html>
